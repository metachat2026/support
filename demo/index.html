<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaChat 企业控制台 Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f9fafb;color:#1f2937}
.app{display:flex;height:100vh}
/* Sidebar */
.sidebar{width:256px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:16px;border-bottom:1px solid #f3f4f6}
.sidebar-logo h1{font-size:18px;font-weight:700;color:#4f46e5}
.sidebar-logo p{font-size:12px;color:#9ca3af}
.sidebar-role{padding:12px;border-bottom:1px solid #f3f4f6}
.sidebar-role label{font-size:12px;color:#9ca3af;display:block;margin-bottom:4px}
.sidebar-role select{width:100%;font-size:14px;border:1px solid #e5e7eb;border-radius:6px;padding:6px 8px;outline:none}
.sidebar-nav{flex:1;padding:12px}
.sidebar-nav button{width:100%;text-align:left;padding:8px 12px;border:none;background:none;border-radius:8px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;color:#4b5563;margin-bottom:2px}
.sidebar-nav button:hover{background:#f9fafb}
.sidebar-nav button.active{background:#eef2ff;color:#4338ca;font-weight:500}
.sidebar-user{padding:16px;border-top:1px solid #e5e7eb;display:flex;align-items:center;gap:12px}
.sidebar-avatar{width:32px;height:32px;background:#e0e7ff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:#4338ca;font-weight:500}
.sidebar-user .name{font-size:14px;font-weight:500}
.sidebar-user .meta{font-size:12px;color:#9ca3af}
/* Main */
.main{flex:1;overflow:auto;padding:24px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-header h2{font-size:20px;font-weight:700}
/* Time Range */
.time-range{display:flex;gap:4px;background:#f3f4f6;border-radius:8px;padding:4px}
.time-range button{padding:6px 12px;font-size:14px;border:none;border-radius:6px;cursor:pointer;background:none;color:#4b5563}
.time-range button.active{background:#fff;color:#4f46e5;font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.05)}
/* Cards */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:12px;padding:20px;border:1px solid #f3f4f6;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.kpi-card .label{font-size:14px;color:#6b7280}
.kpi-card .value{font-size:24px;font-weight:700;margin-top:4px}
.kpi-card .value .unit{font-size:14px;font-weight:400;color:#9ca3af}
.kpi-card .change{font-size:12px;margin-top:4px}
.kpi-card .change.up{color:#059669}
.kpi-card .change.down{color:#ef4444}
/* Charts Row */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.chart-box{background:#fff;border-radius:12px;padding:20px;border:1px solid #f3f4f6;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.chart-box h3{font-size:14px;font-weight:500;color:#374151;margin-bottom:16px}
/* Bar Chart */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:180px;padding-top:10px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar-stack{display:flex;flex-direction:column;justify-content:flex-end;width:100%;height:170px}
.bar-api{background:#4f46e5;border-radius:3px 3px 0 0;opacity:.85}
.bar-web{background:#7c3aed;border-radius:3px 3px 0 0;opacity:.65}
.bar-label{font-size:10px;color:#9ca3af;text-align:center}
/* Donut */
.donut-wrap{display:flex;flex-direction:column;align-items:center}
.donut{width:130px;height:130px;border-radius:50%;position:relative;margin-bottom:12px}
.donut-hole{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70px;height:70px;background:#fff;border-radius:50%}
.legend{width:100%}
.legend-item{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:3px 0}
.legend-dot{width:10px;height:10px;border-radius:50%;margin-right:6px;flex-shrink:0}
.legend-name{display:flex;align-items:center;color:#4b5563}
.legend-pct{font-weight:500;color:#1f2937}
/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid #f3f4f6;padding:16px 20px 0}
.tabs button{padding:8px 16px;font-size:14px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:#6b7280;border-radius:8px 8px 0 0}
.tabs button.active{background:#eef2ff;color:#4338ca;font-weight:500;border-bottom-color:#4f46e5}
/* Table */
.table-wrap{background:#fff;border-radius:12px;border:1px solid #f3f4f6;box-shadow:0 1px 2px rgba(0,0,0,.04);overflow:hidden}
table{width:100%;font-size:14px;border-collapse:collapse}
thead{background:#f9fafb}
th{padding:12px;text-align:left;font-weight:500;color:#6b7280;font-size:13px}
td{padding:10px 12px;border-top:1px solid #f9fafb}
tr:hover{background:#f9fafb}
.text-right{text-align:right}
.font-medium{font-weight:500}
.text-gray{color:#6b7280}
.text-sm{font-size:12px}
.text-xs{font-size:11px}
.text-green{color:#059669}
.text-red{color:#ef4444}
.text-amber{color:#d97706}
/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;margin:1px}
.tag-blue{background:#eff6ff;color:#2563eb}
.tag-purple{background:#f5f3ff;color:#7c3aed}
.tag-gray{background:#f3f4f6;color:#4b5563}
.tag-green{background:#ecfdf5;color:#059669}
/* Button */
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500}
.btn-primary{background:#4f46e5;color:#fff}.btn-primary:hover{background:#4338ca}
.btn-outline{background:#fff;border:1px solid #e5e7eb;color:#374151}.btn-outline:hover{background:#f9fafb}
/* Status */
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.status-active{background:#10b981}
.status-disabled{background:#ef4444}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:50}
.modal{background:#fff;border-radius:12px;padding:24px;width:480px;max-height:90vh;overflow:auto}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-footer{display:flex;justify-content:flex-end;gap:12px;margin-top:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;color:#4b5563;margin-bottom:4px}
.form-input{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none}
.form-input:focus{border-color:#4f46e5;box-shadow:0 0 0 2px rgba(79,70,229,.15)}
.form-select{width:100%;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;background:#fff}
.radio-group{display:flex;flex-direction:column;gap:8px}
.radio-label{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer}
/* Balance Card */
.balance-card{background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:12px;padding:24px;color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.3);margin-bottom:20px}
.balance-card .bal-label{font-size:14px;opacity:.8}
.balance-card .bal-value{font-size:36px;font-weight:700;margin-top:8px}
.balance-card .bal-unit{font-size:16px;font-weight:400;opacity:.8}
.balance-card .bal-note{font-size:12px;opacity:.7;margin-top:8px}
.balance-card .bal-actions{display:flex;gap:12px;margin-top:16px}
.btn-white{padding:8px 16px;background:#fff;color:#4f46e5;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.btn-ghost{padding:8px 16px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;font-size:14px;cursor:pointer}
/* Template Cards */
.template-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.template-card{background:#fff;border-radius:12px;border:1px solid #f3f4f6;padding:20px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.template-card h4{font-weight:500;font-size:15px}
.template-card .tc-meta{font-size:14px;color:#4b5563;margin-top:12px;line-height:1.8}
.template-card .tc-footer{display:flex;gap:12px;margin-top:16px;padding-top:12px;border-top:1px solid #f9fafb}
.template-card .tc-footer button{background:none;border:none;font-size:14px;cursor:pointer}
.tc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
/* Tag list */
.tag-list-item{display:flex;align-items:center;justify-content:space-between;padding:16px 20px}
.tag-list-item:not(:first-child){border-top:1px solid #f9fafb}
.tag-list-item .tl-left{display:flex;align-items:center;gap:12px}
.tag-list-item .tl-actions{display:flex;gap:8px}
.tag-list-item .tl-actions button{background:none;border:none;font-size:14px;cursor:pointer;color:#6b7280}
/* Upgrade Flow */
.upgrade-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#eef2ff,#f5f3ff)}
.upgrade-box{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.1);width:100%;max-width:640px;padding:32px}
.steps{display:flex;align-items:center;justify-content:center;gap:8px;margin:24px 0 32px}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500}
.step-dot.done{background:#4f46e5;color:#fff}
.step-dot.pending{background:#f3f4f6;color:#9ca3af}
.step-line{width:48px;height:2px}
.step-line.done{background:#4f46e5}
.step-line.pending{background:#e5e7eb}
.hidden{display:none!important}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.filter-bar{display:flex;gap:12px;margin-bottom:16px;align-items:center}
.info-box{background:#f9fafb;border-radius:8px;padding:20px;margin-bottom:16px}
.success-icon{width:64px;height:64px;background:#ecfdf5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
</style>
</head>
<body>
<div id="root" class="app"></div>

const allTags=[{n:"研发",c:12},{n:"产品",c:5},{n:"设计",c:3},{n:"测试",c:4},{n:"市场",c:6},{n:"销售",c:8},{n:"管理层",c:3},{n:"行政",c:2},{n:"实习生",c:5}];
const templates=[

  {id:2,n:"技术岗",mc:17,q:"月限 2000 元点",m:"白名单：GPT-5系列、Claude Sonnet系列",t:"09:00-18:00 · 周末停用",d:false},
  {id:3,n:"行政岗",mc:8,q:"月限 500 元点",m:"白名单：GPT-4.1 Mini、Kimi K2.5",t:"全天候",d:false},

// === State ===
const state={page:"dashboard",role:"owner",timeRange:"本月",topTab:"model",memberFilter:"全部"};

// === Render Helpers ===
function fmt(n){return n.toLocaleString()}
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs){for(const k in attrs){if(k==="class")e.className=attrs[k];else if(k==="onclick")e.onclick=attrs[k];else if(k==="onchange")e.onchange=attrs[k];else if(k==="html")e.innerHTML=attrs[k];else e.setAttribute(k,attrs[k])}}
  if(children){if(Array.isArray(children))children.forEach(c=>{if(c)e.appendChild(typeof c==="string"?document.createTextNode(c):c)});else if(typeof children==="string")e.textContent=children;else e.appendChild(children)}
  return e;
}

function renderSidebar(){
  const all=[{id:"dashboard",icon:"📊",l:"总览"},{id:"members",icon:"👥",l:"成员管理"},{id:"tags",icon:"🏷️",l:"成员标签"},{id:"templates",icon:"📋",l:"限额模板"},{id:"bills",icon:"📄",l:"账单看板"},{id:"recharge",icon:"💰",l:"充值管理"}];
  const tabs=state.role==="owner"?all:state.role==="admin"?all.filter(t=>t.id!=="recharge"):[{id:"dashboard",icon:"📊",l:"我的用量"}];
  const sidebar=el("aside",{class:"sidebar"});
  sidebar.innerHTML=`
    <div class="sidebar-logo"><h1>MetaChat</h1><p>企业控制台 Demo</p></div>
    <div class="sidebar-role"><label>视角切换</label>
      <select id="role-select">
        <option value="owner"${state.role==="owner"?" selected":""}>Owner（主账号）</option>
        <option value="admin"${state.role==="admin"?" selected":""}>Admin（管理员）</option>
        <option value="member"${state.role==="member"?" selected":""}>Member（子账号）</option>
      </select>
    </div>
    <nav class="sidebar-nav">${tabs.map(t=>`<button data-page="${t.id}" class="${state.page===t.id?"active":""}"><span>${t.icon}</span>${t.l}</button>`).join("")}</nav>
    <div class="sidebar-user"><div class="sidebar-avatar">${state.role==="owner"?"A":state.role==="admin"?"张":"李"}</div>
      <div><div class="name">${state.role==="owner"?"Alan":state.role==="admin"?"张三":"李四"}</div><div class="meta">企业版 · ${fmt(enterprise.balance)} 元点</div></div>
    </div>`;
  sidebar.querySelector("#role-select").onchange=e=>{state.role=e.target.value;render()};
  sidebar.querySelectorAll("[data-page]").forEach(b=>b.onclick=()=>{state.page=b.dataset.page;render()});
  return sidebar;
}

function renderDashboard(){
  const main=document.createElement("div");
  const maxTrend=Math.max(...trend.map(d=>d.w+d.a));
  main.innerHTML=`
    <div class="page-header">
      <h2>总览 Dashboard</h2>
      <div class="time-range">${["今日","本周","本月","上月"].map(t=>`<button data-tr="${t}" class="${state.timeRange===t?"active":""}">${t}</button>`).join("")}</div>
    </div>
    <div class="kpi-row">
      <div class="kpi-card"><div class="label">消耗总额</div><div class="value">12,580 <span class="unit">元点</span></div><div class="change up">↑ 15% vs 上月</div></div>
      <div class="kpi-card"><div class="label">活跃成员</div><div class="value">23 / 35 <span class="unit">人</span></div><div class="change">65% 活跃度</div></div>
      <div class="kpi-card"><div class="label">调用次数</div><div class="value">45,230 <span class="unit">次</span></div><div class="change up">↑ 8% vs 上月</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-box">
        <h3>消耗趋势（${state.timeRange}）</h3>
        <div class="bar-chart">${trend.map(d=>{
          const apiH=(d.a/maxTrend)*170;const webH=(d.w/maxTrend)*170;
          return `<div class="bar-group"><div class="bar-stack"><div class="bar-web" style="height:${webH}px"></div><div class="bar-api" style="height:${apiH}px"></div></div><div class="bar-label">${d.d}</div></div>`;
        }).join("")}</div>
        <div style="display:flex;gap:16px;margin-top:8px;font-size:12px">
          <span><span style="display:inline-block;width:10px;height:10px;background:#4f46e5;border-radius:2px;margin-right:4px"></span>API</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#7c3aed;opacity:.65;border-radius:2px;margin-right:4px"></span>网页端</span>
        </div>
      </div>
      <div class="chart-box">
        <h3>模型消耗分布</h3>
        <div class="donut-wrap">
          <div class="donut" style="background:conic-gradient(${dist.map((d,i)=>{const a=dist.slice(0,i).reduce((s,x)=>s+x.p,0);return `${d.c} ${a}% ${a+d.p}%`}).join(",")})"><div class="donut-hole"></div></div>
          <div class="legend">${dist.map(d=>`<div class="legend-item"><div class="legend-name"><span class="legend-dot" style="background:${d.c}"></span>${d.n}</div><span class="legend-pct">${d.p}%</span></div>`).join("")}</div>
        </div>
      </div>
    </div>
    <div class="table-wrap">
      <div class="tabs">${[["model","TOP 模型"],["member","TOP 子账号"],["tag","TOP 标签"],["template","TOP 模板"]].map(([k,l])=>`<button data-tab="${k}" class="${state.topTab===k?"active":""}">${l}</button>`).join("")}</div>
      <div style="padding:20px" id="top-content"></div>
    </div>`;
  main.querySelectorAll("[data-tr]").forEach(b=>b.onclick=()=>{state.timeRange=b.dataset.tr;render()});
  main.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{state.topTab=b.dataset.tab;render()});
  // top content
  const tc=main.querySelector("#top-content");
  if(state.topTab==="model"){
    tc.innerHTML=`<table><thead><tr><th>#</th><th>模型</th><th class="text-right">消耗(元点)</th><th class="text-right">调用次数</th><th class="text-right">占比</th><th class="text-right">趋势</th></tr></thead><tbody>${topModels.map(m=>`<tr><td class="text-gray">${m.r}</td><td class="font-medium">${m.n}</td><td class="text-right">${fmt(m.cost)}</td><td class="text-right text-gray">${fmt(m.calls)}</td><td class="text-right text-gray">${m.p}%</td><td class="text-right ${m.t>0?"text-green":m.t<0?"text-red":"text-gray"}">${m.t>0?"↑":m.t<0?"↓":"→"} ${Math.abs(m.t)}%</td></tr>`).join("")}</tbody></table>`;
  } else if(state.topTab==="member"){
    const sorted=[...members].sort((a,b)=>b.cost-a.cost).slice(0,10);
    tc.innerHTML=`<table><thead><tr><th>#</th><th>成员</th><th>标签</th><th>模板</th><th class="text-right">消耗</th><th class="text-right">限额</th></tr></thead><tbody>${sorted.map((m,i)=>{const r=m.quota>0?m.cost/m.quota:0;const ic=r>=1?"🔴":r>=.8?"🟡":"🟢";return `<tr style="${r>=1?"background:#fef2f2":""}"><td class="text-gray">${i+1}</td><td><div class="font-medium">${m.n}</div><div class="text-xs text-gray">${m.e}</div></td><td>${m.tags.map(t=>`<span class="tag tag-blue">${t}</span>`).join("")}</td><td class="text-gray">${m.tpl||"—"}</td><td class="text-right font-medium">${fmt(m.cost)}</td><td class="text-right text-xs">${ic} ${m.qp==="day"?"日限"+m.quota:"月限"+fmt(m.quota)}</td></tr>`}).join("")}</tbody></table>`;
  } else if(state.topTab==="tag"){
    tc.innerHTML=`<table><thead><tr><th>#</th><th>标签</th><th class="text-right">成员数</th><th class="text-right">总消耗</th><th class="text-right">人均消耗</th><th class="text-right">占比</th><th>主要模型</th></tr></thead><tbody>${topTags.map(t=>`<tr><td class="text-gray">${t.r}</td><td class="font-medium">${t.n}</td><td class="text-right">${t.mc}人</td><td class="text-right">${fmt(t.tc)}</td><td class="text-right text-gray">${t.ac}</td><td class="text-right text-gray">${t.p}%</td><td class="text-gray">${t.tm}</td></tr>`).join("")}</tbody></table>`;
  } else {
    tc.innerHTML=`<table><thead><tr><th>#</th><th>模板</th><th class="text-right">关联人数</th><th class="text-right">总消耗</th><th class="text-right">人均</th><th class="text-right">占比</th><th class="text-right">触顶人数</th></tr></thead><tbody>${topTpl.map(t=>`<tr><td class="text-gray">${t.r}</td><td class="font-medium">${t.n}</td><td class="text-right">${t.mc}人</td><td class="text-right">${fmt(t.tc)}</td><td class="text-right text-gray">${t.ac}</td><td class="text-right text-gray">${t.p}%</td><td class="text-right ${t.cap>0?"text-red font-medium":"text-gray"}">${t.cap}人</td></tr>`).join("")}</tbody></table>`;
  }
  return main;
}

function renderMembers(){
  const d=document.createElement("div");
  const flt=state.memberFilter;
  const fl=flt==="全部"?members:members.filter(m=>m.tags.includes(flt));
  d.innerHTML=`
    <div class="page-header"><h2>成员管理</h2><button class="btn btn-primary" onclick="showModal('invite')">+ 邀请成员</button></div>
    <div class="filter-bar">
      <input class="form-input" style="width:256px" placeholder="搜索成员姓名/邮箱"/>
      <select class="form-select" style="width:auto" id="tag-filter"><option>全部</option>${allTags.map(t=>`<option${flt===t.n?" selected":""}>${t.n}</option>`).join("")}</select>
    </div>
    <div class="table-wrap"><table><thead><tr><th>成员</th><th>角色</th><th>标签</th><th>模板</th><th>状态</th><th class="text-right">本月消耗</th><th class="text-right">限额</th><th>操作</th></tr></thead>
    <tbody>${fl.map(m=>{const r=m.quota>0?m.cost/m.quota:0;return `<tr style="${r>=1?"background:#fef2f2":""}">
      <td><div class="font-medium">${m.n}</div><div class="text-xs text-gray">${m.e}</div></td>
      <td><span class="tag ${m.role==="admin"?"tag-purple":"tag-gray"}">${m.role==="admin"?"管理员":"成员"}</span></td>
      <td>${m.tags.map(t=>`<span class="tag tag-blue">${t}</span>`).join(" ")}</td>
      <td class="text-gray">${m.tpl||"—"}</td>
      <td><span class="status-dot status-${m.st}"></span><span class="text-xs">${m.st==="active"?"正常":"已禁用"}</span></td>
      <td class="text-right font-medium">${fmt(m.cost)}</td>
      <td class="text-right text-xs">${m.qp==="day"?"日限"+m.quota:"月限"+fmt(m.quota)}</td>
      <td><button class="text-xs" style="color:#4f46e5;background:none;border:none;cursor:pointer" onclick="showModal('edit',${m.id})">编辑</button></td>
    </tr>`}).join("")}</tbody></table></div>`;
  d.querySelector("#tag-filter").onchange=e=>{state.memberFilter=e.target.value;render()};
  return d;
}

function renderTags(){
  const d=document.createElement("div");
  d.innerHTML=`
    <div class="page-header"><h2>成员标签</h2><button class="btn btn-primary" onclick="showModal('tag')">+ 新建标签</button></div>
    <div class="table-wrap">${allTags.map(t=>`<div class="tag-list-item"><div class="tl-left"><span class="tag tag-blue" style="font-size:14px;font-weight:500">${t.n}</span><span class="text-sm text-gray">${t.c} 人</span></div><div class="tl-actions"><button style="color:#4f46e5">编辑</button><button style="color:#ef4444">删除</button></div></div>`).join("")}</div>`;
  return d;
}

function renderTemplates(){
  const d=document.createElement("div");
  d.innerHTML=`
    <div class="page-header"><h2>限额模板</h2><button class="btn btn-primary" onclick="showModal('template')">+ 新建模板</button></div>
    <div class="template-grid">${templates.map(t=>`<div class="template-card">
      <div class="tc-top"><h4>${t.n} ${t.d?'<span class="tag tag-gray">预置</span>':""}</h4><span class="text-sm text-gray">${t.mc} 人</span></div>
      <div class="tc-meta">额度：${t.q}<br>模型：${t.m}<br>时段：${t.t}</div>
      <div class="tc-footer"><button style="color:#4f46e5">编辑</button>${!t.d?'<button style="color:#ef4444">删除</button>':""}</div>
    </div>`).join("")}</div>`;
  return d;
}

function renderBills(){
  const d=document.createElement("div");
  d.innerHTML=`
    <div class="page-header"><h2>账单看板</h2><button class="btn btn-outline">导出 CSV</button></div>
    <div class="filter-bar">
      <select class="form-select" style="width:auto"><option>本月</option><option>上月</option></select>
      <select class="form-select" style="width:auto"><option>全部成员</option>${members.map(m=>`<option>${m.n}</option>`).join("")}</select>
      <select class="form-select" style="width:auto"><option>全部渠道</option><option>网页端</option><option>API</option></select>
    </div>
    <div class="kpi-row">
      <div class="kpi-card"><div class="label">总消耗</div><div class="value">485 <span class="unit">元点</span></div></div>
      <div class="kpi-card"><div class="label">网页端</div><div class="value">305 <span class="unit">(63%)</span></div></div>
      <div class="kpi-card"><div class="label">API</div><div class="value">180 <span class="unit">(37%)</span></div></div>
    </div>
    <div class="table-wrap"><table><thead><tr><th>时间</th><th>成员</th><th>渠道</th><th>模型</th><th class="text-right">消耗</th></tr></thead>
    <tbody>${bills.map(b=>`<tr><td class="text-gray">${b.d}</td><td class="font-medium">${b.m}</td><td><span class="tag ${b.ch==="API"?"tag-purple":"tag-blue"}">${b.ch}</span></td><td class="text-gray">${b.mod}</td><td class="text-right font-medium">${b.cost}</td></tr>`).join("")}</tbody></table></div>`;
  return d;
}

function renderRecharge(){
  const d=document.createElement("div");
  d.innerHTML=`
    <div class="page-header"><h2>充值管理</h2></div>
    <div class="balance-card">
      <div class="bal-label">企业元点余额</div>
      <div class="bal-value">${fmt(enterprise.balance)} <span class="bal-unit">元点</span></div>
      <div class="bal-note">按近30天消耗速率，预计可用 28 天</div>
      <div class="bal-actions"><button class="btn-white">立即充值</button><button class="btn-ghost" onclick="showModal('alert')">预警设置</button></div>
    </div>
    <div class="chart-box" style="margin-bottom:20px"><h3>充值规则</h3><ul style="line-height:2;font-size:14px;color:#4b5563;list-style:none;padding-left:0"><li>· 最低起充 ¥1,000（1,000 元点）</li><li>· 支持微信、支付宝、对公转账</li><li>· 对公转账后联系客服申请发票</li></ul></div>
    <div class="table-wrap"><div style="padding:12px 20px;border-bottom:1px solid #f3f4f6"><h3 style="font-size:14px;font-weight:500">充值记录</h3></div>
    <table><thead><tr><th>时间</th><th class="text-right">金额</th><th>方式</th><th>状态</th><th>发票</th></tr></thead>
    <tbody>${recharges.map(r=>`<tr><td class="text-gray">${r.d}</td><td class="text-right font-medium">${fmt(r.a)}</td><td>${r.m}</td><td class="text-green text-xs">✓ 成功</td><td class="text-xs">${r.inv}</td></tr>`).join("")}</tbody></table></div>`;
  return d;
}

function showModal(type, id){
  let html="";
  if(type==="invite"){
    html=`<h3>邀请成员</h3>
      <div class="form-group"><label>邮箱</label><input class="form-input" placeholder="输入邮箱地址"/></div>
      <div class="form-group"><label>标签</label><select class="form-select"><option>选择标签...</option>${allTags.map(t=>`<option>${t.n}</option>`).join("")}</select></div>
      <div class="form-group"><label>限额模板</label><select class="form-select">${templates.map(t=>`<option>${t.n}</option>`).join("")}</select></div>
      <p class="text-xs text-gray" style="margin-top:8px">⚠️ 仅支持未注册 MetaChat 的邮箱</p>`;
  } else if(type==="edit"){
    const m=members.find(x=>x.id===id);
    html=`<h3>编辑成员：${m.n}</h3><p class="text-sm text-gray" style="margin-bottom:16px">${m.e}</p>
      <div class="form-group"><label style="font-weight:500">标签</label><div>${m.tags.map(t=>`<span class="tag tag-blue">${t} ×</span>`).join(" ")} <span class="tag tag-gray" style="border:1px dashed #d1d5db;cursor:pointer">+ 添加</span></div></div>
      <div class="form-group"><label style="font-weight:500">限额模板</label><select class="form-select">${templates.map(t=>`<option${t.n===m.tpl?" selected":""}>${t.n}</option>`).join("")}</select></div>
      <div style="border-top:1px solid #f3f4f6;padding-top:16px;margin-top:16px">
        <p style="font-weight:500;font-size:14px;margin-bottom:12px">个人覆盖设置</p>
        <div class="form-group"><label class="text-xs text-gray">额度</label><div class="radio-group"><label class="radio-label"><input type="radio" name="q" checked/> 跟随模板</label><label class="radio-label"><input type="radio" name="q"/> 自定义</label></div></div>
        <div class="form-group"><label class="text-xs text-gray">模型访问</label><div class="radio-group"><label class="radio-label"><input type="radio" name="m" checked/> 跟随模板</label><label class="radio-label"><input type="radio" name="m"/> 自定义</label></div></div>
        <div class="form-group"><label class="text-xs text-gray">时段</label><div class="radio-group"><label class="radio-label"><input type="radio" name="t" checked/> 跟随模板</label><label class="radio-label"><input type="radio" name="t"/> 自定义</label><label class="radio-label"><input type="radio" name="t"/> 不限制</label></div></div>
      </div>`;
  } else if(type==="tag"){
    html=`<h3>新建标签</h3><div class="form-group"><label>标签名称</label><input class="form-input" placeholder="标签名称（2-20字符）"/></div>`;
  } else if(type==="template"){
    html=`<h3>新建限额模板</h3>
      <div class="form-group"><label>模板名称</label><input class="form-input" placeholder="如：技术岗"/></div>
      <div class="form-group"><label style="font-weight:500">额度限制</label><div class="radio-group"><label class="radio-label"><input type="radio" name="tq" checked/> 不设限</label><label class="radio-label"><input type="radio" name="tq"/> 设置上限</label></div></div>
      <div class="form-group"><label style="font-weight:500">模型访问</label><div class="radio-group"><label class="radio-label"><input type="radio" name="tm" checked/> 不限制</label><label class="radio-label"><input type="radio" name="tm"/> 白名单</label><label class="radio-label"><input type="radio" name="tm"/> 黑名单</label></div></div>
      <div class="form-group"><label style="font-weight:500">使用时段</label><div class="radio-group"><label class="radio-label"><input type="radio" name="tt" checked/> 全天候</label><label class="radio-label"><input type="radio" name="tt"/> 自定义时段</label></div></div>`;
  } else if(type==="alert"){
    html=`<h3>预警设置</h3><p class="text-sm text-gray" style="margin-bottom:16px">余额低于阈值时自动通知</p>
      <div class="form-group"><label class="radio-label"><input type="checkbox" checked/> 启用余额预警</label></div>
      <div class="form-group"><label>预警阈值</label><div style="display:flex;align-items:center;gap:8px"><input class="form-input" type="number" value="500" style="width:auto;flex:1"/><span class="text-sm text-gray">元点</span></div><p class="text-xs text-gray" style="margin-top:4px">余额低于此数值时通知</p></div>
      <div class="form-group"><label style="margin-bottom:8px">通知方式</label><label class="radio-label" style="margin-bottom:4px"><input type="checkbox" checked/> 邮件通知</label><label class="radio-label"><input type="checkbox" checked/> 站内通知</label></div>`;
  }
  const overlay=document.createElement("div");
  overlay.className="modal-overlay";
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
  overlay.innerHTML=`<div class="modal">${html}<div class="modal-footer"><button class="btn btn-outline" id="modal-cancel">取消</button><button class="btn btn-primary" id="modal-ok">确认</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector("#modal-cancel").onclick=()=>overlay.remove();
  overlay.querySelector("#modal-ok").onclick=()=>overlay.remove();
}

function render(){
  const root=document.getElementById("root");
  root.innerHTML="";
  root.className="app";
  root.appendChild(renderSidebar());
  const main=document.createElement("main");
  main.className="main";
  if(state.page==="dashboard")main.appendChild(renderDashboard());
  else if(state.page==="members")main.appendChild(renderMembers());
  else if(state.page==="tags")main.appendChild(renderTags());
  else if(state.page==="templates")main.appendChild(renderTemplates());
  else if(state.page==="bills")main.appendChild(renderBills());
  else if(state.page==="recharge")main.appendChild(renderRecharge());
  root.appendChild(main);
}

render();
</script>
</body>
</html>
