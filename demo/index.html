<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaChat 企业控制台 Demo</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2/umd/Recharts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#4f46e5','primary-light':'#eef2ff'}}}}</script>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="root"></div>
<script type="text/babel">
const {useState} = React;
const {AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell} = Recharts;

// Mock Data
const enterprise = {name:"星辰科技有限公司",balance:12380,totalMembers:35,activeMembers:23};
const trendData = [
  {date:"05/01",web:800,api:1200},{date:"05/02",web:650,api:1100},{date:"05/03",web:900,api:1400},
  {date:"05/04",web:200,api:400},{date:"05/05",web:150,api:350},{date:"05/06",web:1100,api:1600},
  {date:"05/07",web:950,api:1350},{date:"05/08",web:1050,api:1500},{date:"05/09",web:880,api:1320},
  {date:"05/10",web:750,api:1150},{date:"05/11",web:200,api:300},{date:"05/12",web:180,api:280},
  {date:"05/13",web:1000,api:1500},{date:"05/14",web:1100,api:1650}
];
const modelDist = [
  {name:"GPT-5.4",cost:4200,pct:33.4},{name:"Claude Opus",cost:2800,pct:22.3},
  {name:"GPT-5",cost:1500,pct:11.9},{name:"Gemini 2.5",cost:1280,pct:10.2},{name:"其他",cost:2800,pct:22.2}
];
const COLORS = ["#4f46e5","#7c3aed","#2563eb","#0891b2","#d1d5db"];
const topModels = [
  {rank:1,name:"GPT-5.4",cost:4200,calls:1230,pct:33.4,trend:12},
  {rank:2,name:"Claude Opus",cost:2800,calls:890,pct:22.3,trend:5},
  {rank:3,name:"GPT-5",cost:1500,calls:3400,pct:11.9,trend:-3},
  {rank:4,name:"Gemini 2.5",cost:1280,calls:2100,pct:10.2,trend:8},
  {rank:5,name:"Claude Sonnet",cost:980,calls:4500,pct:7.8,trend:0},
  {rank:6,name:"Midjourney",cost:720,calls:180,pct:5.7,trend:25},
  {rank:7,name:"GPT-4.1",cost:450,calls:2800,pct:3.6,trend:-10},
  {rank:8,name:"Kimi K2.5",cost:320,calls:5600,pct:2.5,trend:0},
  {rank:9,name:"Grok 4.1",cost:180,calls:620,pct:1.4,trend:50},
  {rank:10,name:"DeepSeek-V3",cost:150,calls:8200,pct:1.2,trend:-5}
];
const members = [
  {id:1,name:"张三",email:"zhang@star.com",role:"admin",tags:["研发","管理层"],template:"技术岗",status:"active",cost:2100,quota:2000,qp:"month"},
  {id:2,name:"李四",email:"li@star.com",role:"member",tags:["研发"],template:"技术岗",status:"active",cost:1800,quota:2000,qp:"month"},
  {id:3,name:"王五",email:"wang@star.com",role:"member",tags:["产品"],template:null,status:"active",cost:1200,quota:3000,qp:"month"},
  {id:4,name:"赵六",email:"zhao@star.com",role:"member",tags:["研发"],template:"技术岗",status:"active",cost:2000,quota:2000,qp:"month"},
  {id:5,name:"孙七",email:"sun@star.com",role:"member",tags:["设计"],template:"设计岗",status:"active",cost:850,quota:1500,qp:"month"},
  {id:6,name:"周八",email:"zhou@star.com",role:"member",tags:["市场"],template:"行政岗",status:"active",cost:620,quota:500,qp:"month"},
  {id:7,name:"吴九",email:"wu@star.com",role:"member",tags:["测试"],template:"技术岗",status:"active",cost:580,quota:2000,qp:"month"},
  {id:8,name:"郑十",email:"zheng@star.com",role:"member",tags:["行政"],template:"行政岗",status:"active",cost:320,quota:500,qp:"month"},
  {id:9,name:"陈一",email:"chen@star.com",role:"member",tags:["实习生"],template:"实习生",status:"active",cost:180,quota:20,qp:"day"},
  {id:10,name:"林二",email:"lin@star.com",role:"member",tags:["销售"],template:"行政岗",status:"active",cost:150,quota:500,qp:"month"}
];
const tags = ["研发","产品","设计","测试","市场","销售","管理层","行政","实习生"];
const templates = [
  {id:1,name:"默认",count:6,quota:"不设限",model:"不限制",time:"全天候",isDefault:true},
  {id:2,name:"技术岗",count:17,quota:"月限 2000 元点",model:"白名单: GPT-5系列, Claude Sonnet系列",time:"09:00-18:00 · 周末停用",isDefault:false},
  {id:3,name:"行政岗",count:8,quota:"月限 500 元点",model:"白名单: GPT-4.1 Mini, Kimi K2.5",time:"全天候",isDefault:false},
  {id:4,name:"设计岗",count:3,quota:"月限 1500 元点",model:"白名单: GPT-5系列, Midjourney系列",time:"全天候",isDefault:false},
  {id:5,name:"管理层",count:3,quota:"不设限",model:"不限制",time:"全天候",isDefault:false},
  {id:6,name:"实习生",count:5,quota:"日限 20 元点",model:"白名单: GPT-4.1 Mini, Kimi K2.5, DeepSeek-V3",time:"09:00-18:00 · 周末停用",isDefault:false}
];

// === Components ===
function Sidebar({page, setPage, role, setRole}) {
  const ownerTabs = [{id:"dashboard",icon:"📊",label:"总览"},{id:"members",icon:"👥",label:"成员管理"},{id:"tags",icon:"🏷️",label:"成员标签"},{id:"templates",icon:"📋",label:"限额模板"},{id:"bills",icon:"📄",label:"账单看板"},{id:"recharge",icon:"💰",label:"充值管理"}];
  const tabs = role==="owner"?ownerTabs:role==="admin"?ownerTabs.filter(t=>t.id!=="recharge"):[{id:"dashboard",icon:"📊",label:"我的用量"}];
  return (
    <aside className="w-64 bg-white border-r border-gray-200 flex flex-col h-full shrink-0">
      <div className="p-4 border-b"><h1 className="text-lg font-bold text-primary">MetaChat</h1><p className="text-xs text-gray-500">企业控制台 Demo</p></div>
      <div className="p-3 border-b"><label className="text-xs text-gray-500 block mb-1">视角切换</label>
        <select value={role} onChange={e=>setRole(e.target.value)} className="w-full text-sm border rounded px-2 py-1.5">
          <option value="owner">Owner（主账号）</option><option value="admin">Admin（管理员）</option><option value="member">Member（子账号）</option>
        </select>
      </div>
      <nav className="flex-1 p-3 space-y-1">{tabs.map(t=>(
        <button key={t.id} onClick={()=>setPage(t.id)} className={`w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2 ${page===t.id?"bg-indigo-50 text-indigo-700 font-medium":"text-gray-600 hover:bg-gray-50"}`}><span>{t.icon}</span>{t.label}</button>
      ))}</nav>
      <div className="p-4 border-t"><div className="flex items-center gap-3">
        <div className="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-sm">{role==="owner"?"A":"张"}</div>
        <div><p className="text-sm font-medium">{role==="owner"?"Alan":"张三"}</p><p className="text-xs text-gray-500">企业版 · {enterprise.balance.toLocaleString()} 元点</p></div>
      </div></div>
    </aside>
  );
}

function Dashboard() {
  const [timeRange, setTimeRange] = useState("本月");
  const [topTab, setTopTab] = useState("model");
  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-bold text-gray-800">总览 Dashboard</h2>
        <div className="flex gap-1 bg-gray-100 rounded-lg p-1">
          {["今日","本周","本月","上月"].map(t=><button key={t} onClick={()=>setTimeRange(t)} className={`px-3 py-1.5 text-sm rounded-md ${timeRange===t?"bg-white text-indigo-600 shadow-sm font-medium":"text-gray-600"}`}>{t}</button>)}
        </div>
      </div>
      {/* KPI */}
      <div className="grid grid-cols-3 gap-4">
        <div className="bg-white rounded-xl p-5 border shadow-sm"><p className="text-sm text-gray-500">消耗总额</p><p className="text-2xl font-bold mt-1">12,580 <span className="text-sm font-normal text-gray-500">元点</span></p><p className="text-xs text-green-600 mt-1">↑ 15% vs 上月</p></div>
        <div className="bg-white rounded-xl p-5 border shadow-sm"><p className="text-sm text-gray-500">活跃成员</p><p className="text-2xl font-bold mt-1">23 / 35 <span className="text-sm font-normal text-gray-500">人</span></p><p className="text-xs text-gray-500 mt-1">65% 活跃度</p></div>
        <div className="bg-white rounded-xl p-5 border shadow-sm"><p className="text-sm text-gray-500">调用次数</p><p className="text-2xl font-bold mt-1">45,230 <span className="text-sm font-normal text-gray-500">次</span></p><p className="text-xs text-green-600 mt-1">↑ 8% vs 上月</p></div>
      </div>
      {/* Charts */}
      <div className="grid grid-cols-3 gap-4">
        <div className="col-span-2 bg-white rounded-xl p-5 border shadow-sm">
          <h3 className="text-sm font-medium text-gray-700 mb-4">消耗趋势（{timeRange}）</h3>
          <ResponsiveContainer width="100%" height={220}>
            <AreaChart data={trendData}><CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/><XAxis dataKey="date" tick={{fontSize:12}}/><YAxis tick={{fontSize:12}}/><Tooltip/>
              <Area type="monotone" dataKey="api" stackId="1" stroke="#4f46e5" fill="#4f46e5" fillOpacity={0.3} name="API"/>
              <Area type="monotone" dataKey="web" stackId="1" stroke="#7c3aed" fill="#7c3aed" fillOpacity={0.2} name="网页端"/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div className="bg-white rounded-xl p-5 border shadow-sm">
          <h3 className="text-sm font-medium text-gray-700 mb-4">模型消耗分布</h3>
          <ResponsiveContainer width="100%" height={150}>
            <PieChart><Pie data={modelDist} dataKey="cost" nameKey="name" cx="50%" cy="50%" innerRadius={35} outerRadius={60}>
              {modelDist.map((_,i)=><Cell key={i} fill={COLORS[i]}/>)}
            </Pie><Tooltip/></PieChart>
          </ResponsiveContainer>
          <div className="space-y-1 mt-2">{modelDist.map((m,i)=>(
            <div key={m.name} className="flex items-center justify-between text-xs"><div className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full inline-block" style={{backgroundColor:COLORS[i]}}/><span className="text-gray-600">{m.name}</span></div><span className="font-medium">{m.pct}%</span></div>
          ))}</div>
        </div>
      </div>
      {/* TOP */}
      <div className="bg-white rounded-xl border shadow-sm">
        <div className="border-b px-5 pt-4 flex gap-1">
          {[["model","TOP 模型"],["member","TOP 子账号"],["tag","TOP 标签"],["template","TOP 模板"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTopTab(k)} className={`px-4 py-2 text-sm rounded-t-lg ${topTab===k?"bg-indigo-50 text-indigo-700 font-medium border-b-2 border-indigo-600":"text-gray-500"}`}>{l}</button>
          ))}
        </div>
        <div className="p-5">
          {topTab==="model"&&<table className="w-full text-sm"><thead><tr className="text-left text-gray-500 border-b"><th className="pb-2">#</th><th className="pb-2">模型</th><th className="pb-2 text-right">消耗</th><th className="pb-2 text-right">调用</th><th className="pb-2 text-right">占比</th><th className="pb-2 text-right">趋势</th></tr></thead><tbody>
            {topModels.map(m=><tr key={m.rank} className="border-b border-gray-50 hover:bg-gray-50"><td className="py-2 text-gray-400">{m.rank}</td><td className="py-2 font-medium">{m.name}</td><td className="py-2 text-right">{m.cost.toLocaleString()}</td><td className="py-2 text-right text-gray-500">{m.calls.toLocaleString()}</td><td className="py-2 text-right text-gray-500">{m.pct}%</td><td className={`py-2 text-right ${m.trend>0?"text-green-600":m.trend<0?"text-red-500":"text-gray-400"}`}>{m.trend>0?"↑":m.trend<0?"↓":"→"}{Math.abs(m.trend)}%</td></tr>)}
          </tbody></table>}
          {topTab==="member"&&<table className="w-full text-sm"><thead><tr className="text-left text-gray-500 border-b"><th className="pb-2">#</th><th className="pb-2">成员</th><th className="pb-2">标签</th><th className="pb-2">模板</th><th className="pb-2 text-right">消耗</th><th className="pb-2 text-right">限额</th></tr></thead><tbody>
            {members.sort((a,b)=>b.cost-a.cost).map((m,i)=>{const r=m.quota>0?m.cost/m.quota:0;return <tr key={m.id} className={`border-b border-gray-50 ${r>=1?"bg-red-50":""}`}><td className="py-2 text-gray-400">{i+1}</td><td className="py-2"><p className="font-medium">{m.name}</p><p className="text-xs text-gray-400">{m.email}</p></td><td className="py-2"><div className="flex gap-1 flex-wrap">{m.tags.map(t=><span key={t} className="px-1.5 py-0.5 bg-gray-100 rounded text-xs">{t}</span>)}</div></td><td className="py-2 text-gray-600">{m.template||"—"}</td><td className="py-2 text-right font-medium">{m.cost.toLocaleString()}</td><td className="py-2 text-right text-xs">{r>=1?"🔴":r>=0.8?"🟡":"🟢"} {m.qp==="day"?`日限${m.quota}`:`月限${m.quota.toLocaleString()}`}</td></tr>})}
          </tbody></table>}
          {topTab==="tag"&&<div className="text-sm text-gray-500">标签维度 TOP 排行（研发 54.1% → 管理层 16.7% → 产品 11.9% → 设计 9.5% → ...）</div>}
          {topTab==="template"&&<div className="text-sm text-gray-500">模板维度 TOP 排行（技术岗 65.2% → 管理层 16.7% → 设计岗 9.5% → 行政岗 4.9% → ...）</div>}
        </div>
      </div>
    </div>
  );
}

function MemberManagement() {
  const [filter, setFilter] = useState("全部");
  const [showInvite, setShowInvite] = useState(false);
  const [showEdit, setShowEdit] = useState(null);
  const filtered = filter==="全部"?members:members.filter(m=>m.tags.includes(filter));
  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between"><h2 className="text-xl font-bold">成员管理</h2><button onClick={()=>setShowInvite(true)} className="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">+ 邀请成员</button></div>
      <div className="flex gap-3"><input placeholder="搜索成员" className="px-3 py-2 border rounded-lg text-sm w-64"/>
        <select value={filter} onChange={e=>setFilter(e.target.value)} className="px-3 py-2 border rounded-lg text-sm"><option>全部</option>{tags.map(t=><option key={t}>{t}</option>)}</select>
      </div>
      <div className="bg-white rounded-xl border shadow-sm overflow-hidden">
        <table className="w-full text-sm"><thead className="bg-gray-50"><tr className="text-left text-gray-500"><th className="p-3">成员</th><th className="p-3">角色</th><th className="p-3">标签</th><th className="p-3">模板</th><th className="p-3">状态</th><th className="p-3 text-right">本月消耗</th><th className="p-3 text-right">限额</th><th className="p-3">操作</th></tr></thead>
        <tbody>{filtered.map(m=>{const r=m.quota>0?m.cost/m.quota:0;return(
          <tr key={m.id} className={`border-t hover:bg-gray-50 ${r>=1?"bg-red-50":""}`}>
            <td className="p-3"><p className="font-medium">{m.name}</p><p className="text-xs text-gray-400">{m.email}</p></td>
            <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${m.role==="admin"?"bg-purple-100 text-purple-700":"bg-gray-100 text-gray-600"}`}>{m.role==="admin"?"管理员":"成员"}</span></td>
            <td className="p-3"><div className="flex gap-1 flex-wrap">{m.tags.map(t=><span key={t} className="px-1.5 py-0.5 bg-blue-50 text-blue-600 rounded text-xs">{t}</span>)}</div></td>
            <td className="p-3 text-gray-600">{m.template||"—"}</td>
            <td className="p-3"><span className="text-green-600 text-xs">● 正常</span></td>
            <td className="p-3 text-right font-medium">{m.cost.toLocaleString()}</td>
            <td className="p-3 text-right text-xs">{m.qp==="day"?`日限${m.quota}`:`月限${m.quota.toLocaleString()}`}</td>
            <td className="p-3"><button onClick={()=>setShowEdit(m.id)} className="text-indigo-600 text-xs hover:underline">编辑</button></td>
          </tr>
        )})}</tbody></table>
      </div>
      {showInvite&&<Modal title="邀请成员" onClose={()=>setShowInvite(false)}>
        <div className="space-y-3">
          <div><label className="text-sm text-gray-600 block mb-1">邮箱</label><input className="w-full px-3 py-2 border rounded-lg text-sm" placeholder="输入邮箱"/></div>
          <div><label className="text-sm text-gray-600 block mb-1">标签</label><select className="w-full px-3 py-2 border rounded-lg text-sm"><option>选择标签...</option>{tags.map(t=><option key={t}>{t}</option>)}</select></div>
          <div><label className="text-sm text-gray-600 block mb-1">限额模板</label><select className="w-full px-3 py-2 border rounded-lg text-sm">{templates.map(t=><option key={t.name}>{t.name}</option>)}</select></div>
          <p className="text-xs text-gray-400">⚠️ 仅支持未注册 MetaChat 的邮箱</p>
        </div>
      </Modal>}
      {showEdit&&<Modal title={`编辑成员：${members.find(m=>m.id===showEdit)?.name}`} onClose={()=>setShowEdit(null)}>
        <div className="space-y-3">
          <div><label className="text-sm font-medium block mb-1">标签</label><div className="flex gap-1 flex-wrap">{members.find(m=>m.id===showEdit)?.tags.map(t=><span key={t} className="px-2 py-1 bg-blue-50 text-blue-600 rounded text-xs">{t} ×</span>)}<button className="px-2 py-1 border border-dashed rounded text-xs text-gray-400">+ 添加</button></div></div>
          <div><label className="text-sm font-medium block mb-1">限额模板</label><select className="w-full px-3 py-2 border rounded-lg text-sm">{templates.map(t=><option key={t.name}>{t.name}</option>)}</select></div>
          <div className="border-t pt-3"><p className="text-sm font-medium mb-2">个人覆盖设置</p>
            <div className="space-y-2"><label className="flex items-center gap-2 text-sm"><input type="radio" name="q" defaultChecked/> 跟随模板</label><label className="flex items-center gap-2 text-sm"><input type="radio" name="q"/> 自定义额度</label></div>
          </div>
        </div>
      </Modal>}
    </div>
  );
}

function TagManagement() {
  const [showCreate, setShowCreate] = useState(false);
  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between"><h2 className="text-xl font-bold">成员标签</h2><button onClick={()=>setShowCreate(true)} className="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">+ 新建标签</button></div>
      <div className="bg-white rounded-xl border shadow-sm">{tags.map((t,i)=>(
        <div key={t} className={`flex items-center justify-between px-5 py-4 ${i>0?"border-t":""}`}>
          <div className="flex items-center gap-3"><span className="px-2.5 py-1 bg-blue-50 text-blue-600 rounded-md text-sm font-medium">{t}</span><span className="text-sm text-gray-400">{Math.floor(Math.random()*12+2)} 人</span></div>
          <div className="flex gap-2"><button className="text-sm text-gray-500 hover:text-indigo-600">编辑</button><button className="text-sm text-gray-500 hover:text-red-500">删除</button></div>
        </div>
      ))}</div>
      {showCreate&&<Modal title="新建标签" onClose={()=>setShowCreate(false)}><input placeholder="标签名称（2-20字符）" className="w-full px-3 py-2 border rounded-lg text-sm"/></Modal>}
    </div>
  );
}

function TemplateManagement() {
  const [showCreate, setShowCreate] = useState(false);
  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between"><h2 className="text-xl font-bold">限额模板</h2><button onClick={()=>setShowCreate(true)} className="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">+ 新建模板</button></div>
      <div className="grid grid-cols-2 gap-4">{templates.map(t=>(
        <div key={t.id} className="bg-white rounded-xl border p-5 shadow-sm">
          <div className="flex items-center justify-between mb-3"><div className="flex items-center gap-2"><h3 className="font-medium">{t.name}</h3>{t.isDefault&&<span className="text-xs bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">预置</span>}</div><span className="text-sm text-gray-400">{t.count} 人</span></div>
          <div className="space-y-1.5 text-sm text-gray-600"><p>额度：{t.quota}</p><p>模型：{t.model}</p><p>时段：{t.time}</p></div>
          <div className="flex gap-2 mt-4 pt-3 border-t"><button className="text-sm text-indigo-600 hover:underline">编辑</button>{!t.isDefault&&<button className="text-sm text-red-500 hover:underline">删除</button>}</div>
        </div>
      ))}</div>
      {showCreate&&<Modal title="新建限额模板" onClose={()=>setShowCreate(false)}>
        <div className="space-y-4">
          <div><label className="text-sm font-medium block mb-1">模板名称</label><input className="w-full px-3 py-2 border rounded-lg text-sm" placeholder="如：技术岗"/></div>
          <div><label className="text-sm font-medium block mb-2">额度限制</label><div className="space-y-2"><label className="flex items-center gap-2 text-sm"><input type="radio" name="tq" defaultChecked/> 不设限</label><label className="flex items-center gap-2 text-sm"><input type="radio" name="tq"/> 设置上限</label></div></div>
          <div><label className="text-sm font-medium block mb-2">模型访问</label><div className="space-y-2"><label className="flex items-center gap-2 text-sm"><input type="radio" name="tm" defaultChecked/> 不限制</label><label className="flex items-center gap-2 text-sm"><input type="radio" name="tm"/> 白名单</label><label className="flex items-center gap-2 text-sm"><input type="radio" name="tm"/> 黑名单</label></div></div>
          <div><label className="text-sm font-medium block mb-2">使用时段</label><div className="space-y-2"><label className="flex items-center gap-2 text-sm"><input type="radio" name="tt" defaultChecked/> 全天候</label><label className="flex items-center gap-2 text-sm"><input type="radio" name="tt"/> 自定义时段</label></div></div>
        </div>
      </Modal>}
    </div>
  );
}

function BillBoard() {

        <select className="px-3 py-2 border rounded-lg text-sm"><option>本月</option><option>上月</option></select>
        <select className="px-3 py-2 border rounded-lg text-sm"><option>全部成员</option>{members.map(m=><option key={m.id}>{m.name}</option>)}</select>
        <select className="px-3 py-2 border rounded-lg text-sm"><option>全部渠道</option><option>网页端</option><option>API</option></select>

      <div className="grid grid-cols-3 gap-4">

        <div className="bg-white rounded-xl p-4 border"><p className="text-xs text-gray-500">网页端</p><p className="text-xl font-bold mt-1">4,820 (38%)</p></div>

        <table className="w-full text-sm"><thead className="bg-gray-50"><tr className="text-left text-gray-500"><th className="p-3">时间</th><th className="p-3">成员</th><th className="p-3">渠道</th><th className="p-3">模型</th><th className="p-3 text-right">消耗</th></tr></thead>
        <tbody>{[{d:"05-06",m:"张三",c:"API",model:"GPT-5.4",cost:85},{d:"05-06",m:"李四",c:"网页端",model:"Claude Opus",cost:62},{d:"05-06",m:"王五",c:"API",model:"GPT-5",cost:45},{d:"05-05",m:"张三",c:"网页端",model:"GPT-5.4",cost:120},{d:"05-05",m:"赵六",c:"API",model:"Gemini 2.5",cost:38},{d:"05-05",m:"孙七",c:"网页端",model:"Midjourney",cost:95}].map((b,i)=>(
          <tr key={i} className="border-t hover:bg-gray-50"><td className="p-3 text-gray-600">2026-{b.d}</td><td className="p-3 font-medium">{b.m}</td><td className="p-3"><span className={`px-2 py-0.5 rounded text-xs ${b.c==="API"?"bg-purple-50 text-purple-600":"bg-blue-50 text-blue-600"}`}>{b.c}</span></td><td className="p-3 text-gray-600">{b.model}</td><td className="p-3 text-right font-medium">{b.cost}</td></tr>
        ))}</tbody></table>
      </div>

    <div className="space-y-4">
      <h2 className="text-xl font-bold">充值管理</h2>

        <p className="text-sm text-indigo-100">企业元点余额</p>
        <p className="text-4xl font-bold mt-2">{enterprise.balance.toLocaleString()} <span className="text-lg font-normal text-indigo-100">元点</span></p>
        <p className="text-xs text-indigo-100 mt-2">预计可用 28 天</p>
        <div className="flex gap-3 mt-4"><button className="px-4 py-2 bg-white text-indigo-600 rounded-lg text-sm font-medium">立即充值</button><button onClick={()=>setShowAlert(true)} className="px-4 py-2 bg-white/20 border border-white/30 rounded-lg text-sm">预警设置</button></div>

      <div className="bg-white rounded-xl border shadow-sm overflow-hidden"><div className="px-5 py-3 border-b"><h3 className="text-sm font-medium">充值记录</h3></div>
        <table className="w-full text-sm"><thead className="bg-gray-50"><tr className="text-left text-gray-500"><th className="p-3">时间</th><th className="p-3 text-right">金额</th><th className="p-3">方式</th><th className="p-3">状态</th><th className="p-3">发票</th></tr></thead>
        <tbody>{[{d:"2026-05-01",a:10000,m:"对公转账",inv:"已开具"},{d:"2026-04-15",a:5000,m:"微信支付",inv:"未申请"},{d:"2026-04-01",a:10000,m:"对公转账",inv:"已开具"}].map((r,i)=>(
          <tr key={i} className="border-t hover:bg-gray-50"><td className="p-3 text-gray-600">{r.d}</td><td className="p-3 text-right font-medium">{r.a.toLocaleString()}</td><td className="p-3">{r.m}</td><td className="p-3 text-green-600 text-xs">✓ 成功</td><td className="p-3 text-xs">{r.inv}</td></tr>
        ))}</tbody></table>
      </div>
      {showAlert&&<Modal title="预警设置" onClose={()=>setShowAlert(false)}>
        <div className="space-y-4">
          <label className="flex items-center gap-2 text-sm"><input type="checkbox" defaultChecked/> 启用余额预警</label>
          <div><label className="text-sm block mb-1">预警阈值</label><div className="flex items-center gap-2"><input type="number" defaultValue={500} className="flex-1 px-3 py-2 border rounded-lg text-sm"/><span className="text-sm text-gray-500">元点</span></div><p className="text-xs text-gray-400 mt-1">余额低于此数值时通知</p></div>
          <div><label className="text-sm block mb-2">通知方式</label><label className="flex items-center gap-2 text-sm"><input type="checkbox" defaultChecked/> 邮件</label><label className="flex items-center gap-2 text-sm ml-4"><input type="checkbox" defaultChecked/> 站内通知</label></div>
        </div>
      </Modal>}
    </div>
  );
}

function Modal({title, onClose, children}) {
  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50" onClick={onClose}>
      <div className="bg-white rounded-xl p-6 w-[480px] max-h-[90vh] overflow-auto" onClick={e=>e.stopPropagation()}>
        <h3 className="text-lg font-bold mb-4">{title}</h3>
        {children}
        <div className="flex justify-end gap-3 mt-6"><button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">取消</button><button onClick={onClose} className="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">确认</button></div>
      </div>
    </div>
  );
}

// === App ===
function App() {
  const [page, setPage] = useState("dashboard");
  const [role, setRole] = useState("owner");
  return (
    <div className="flex h-screen">
      <Sidebar page={page} setPage={setPage} role={role} setRole={setRole}/>
      <main className="flex-1 overflow-auto p-6">
        {page==="dashboard"&&<Dashboard/>}
        {page==="members"&&<MemberManagement/>}
        {page==="tags"&&<TagManagement/>}
        {page==="templates"&&<TemplateManagement/>}
        {page==="bills"&&<BillBoard/>}
        {page==="recharge"&&<RechargeManagement/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
